<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Events — FestNest</title>
  <link rel="icon" type="image/png" href="/assets/images/fn_logo2.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --indigo:#4F46E5;
  --indigo-dark:#3730A3;
  --indigo-light:#EEF2FF;
  --indigo-mid:#818CF8;
  --surface:#FFFFFF;
  --surface-2:#F8F8F6;
  --surface-3:#F1F0ED;
  --text-1:#111110;
  --text-2:#4B4B47;
  --text-3:#8A8A85;
  --border:#E4E4E0;
  --border-strong:#CBCBC6;
  --green:#16A34A;
  --green-bg:#F0FDF4;
  --amber:#B45309;
  --amber-bg:#FFFBEB;
  --red:#DC2626;
  --red-bg:#FEF2F2;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --radius-xl:22px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.1),0 4px 8px rgba(0,0,0,0.05);
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--surface-2);color:var(--text-1);min-height:100vh;font-size:15px;line-height:1.5}

/* ── TOP NAV ── */
.top-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.logo{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--indigo);letter-spacing:-0.5px;display:flex;align-items:center;gap:6px}
.logo-dot{width:7px;height:7px;background:var(--indigo);border-radius:50%;margin-bottom:1px}
.nav-desktop{display:flex;gap:24px;flex:1;margin-left:40px}
.nav-desktop a{font-size:14px;font-weight:500;color:var(--text-2);text-decoration:none;transition:color 0.15s}
.nav-desktop a:hover{color:var(--indigo)}
.nav-desktop a.active{color:var(--indigo);font-weight:600}
.nav-actions{display:flex;align-items:center;gap:12px}
.icon-btn{width:36px;height:36px;border:none;background:none;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);transition:background 0.15s}
.icon-btn:hover{background:var(--surface-3)}
.icon-btn svg{width:20px;height:20px}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--indigo-light);border:2px solid var(--indigo);display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--indigo)}
.btn{border:none;border-radius:var(--radius-md);padding:10px 16px;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-primary{background:var(--indigo);color:white}
.btn-primary:hover{background:var(--indigo-dark)}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text-1)}
.btn-outline:hover{border-color:var(--indigo);color:var(--indigo)}
.hamburger{display:none;width:24px;height:24px;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer}
.hamburger span{width:100%;height:2px;background:var(--text-1);border-radius:1px;transition:all 0.3s}

/* ── MAIN LAYOUT ── */
.events-container{max-width:100%;margin:0 auto;background:var(--surface);min-height:100vh}
.events-content{display:grid;grid-template-columns:280px 1fr;gap:0;max-width:1200px;margin:0 auto;padding:24px 0}

/* ── SIDEBAR ── */
.events-sidebar{padding:0 20px;border-right:1px solid var(--border);height:fit-content;position:sticky;top:80px}
.sidebar-card{margin-bottom:24px}
.sidebar-heading{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-1);margin-bottom:14px}
.filter-group{margin-bottom:16px}
.filter-group-label{font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;display:block}
.filter-options{display:flex;flex-wrap:wrap;gap:6px}
.filter-chip{padding:6px 12px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all 0.15s}
.filter-chip:hover{border-color:var(--indigo-mid);color:var(--indigo)}
.filter-chip.filter-chip--active{background:var(--indigo-light);border-color:var(--indigo);color:var(--indigo)}
.trending-tags{display:flex;flex-wrap:wrap;gap:6px}
.trending-tag{padding:6px 12px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--indigo);cursor:pointer;transition:all 0.15s}
.trending-tag:hover{border-color:var(--indigo);background:var(--indigo-light)}
.btn-clear-filters{width:100%;padding:8px 12px;border:1.5px solid var(--border);background:none;border-radius:var(--radius-md);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all 0.15s;margin-top:12px}
.btn-clear-filters:hover{border-color:var(--indigo);color:var(--indigo)}

/* ── MAIN CONTENT ── */
.events-main{padding:0 20px}
.events-header{margin-bottom:24px}
.search-bar-events{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;transition:border-color 0.15s}
.search-bar-events:focus-within{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
.search-bar-events input{border:none;outline:none;flex:1;font-family:var(--font-body);font-size:14px;color:var(--text-1);background:transparent}
.search-bar-events input::placeholder{color:var(--text-3)}
.filter-btn-mobile{display:none;background:var(--indigo);border:none;border-radius:var(--radius-sm);padding:6px 8px;cursor:pointer;color:white}
.events-topbar{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.events-sort{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:13px;cursor:pointer;background:var(--surface);color:var(--text-1)}
.events-result-count{font-size:13px;color:var(--text-3);margin-left:auto}
.cat-pills{display:flex;gap:8px;overflow-x:auto;padding:12px 0;scrollbar-width:none;margin-bottom:16px}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.cat-pill:hover{border-color:var(--indigo);color:var(--indigo)}
.cat-pill.cat-pill--active{background:var(--indigo);color:white;border-color:var(--indigo)}

/* ── EVENTS GRID ── */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.event-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.event-card-img{width:100%;height:200px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;overflow:hidden}
.event-card-badge{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:50px;text-transform:uppercase}
.badge-free{background:var(--green-bg);color:var(--green)}
.badge-paid{background:var(--amber-bg);color:var(--amber)}
.badge-prize{background:var(--indigo-light);color:var(--indigo)}
.event-card-save{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);transition:all 0.15s}
.event-card-save:hover{background:white;color:var(--indigo)}
.event-card-save svg{width:16px;height:16px}
.event-card-body{padding:14px 16px}
.event-card-category{font-size:11px;font-weight:600;color:var(--indigo);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
.event-card-title{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text-1);line-height:1.3;margin-bottom:4px}
.event-card-college{font-size:12px;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.event-card-college svg{width:12px;height:12px;color:var(--text-3)}
.event-card-meta{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}
.event-card-action{margin-top:10px;display:flex;gap:8px}
.event-card-action .btn{flex:1;padding:8px 12px;font-size:12px}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(17,17,16,0.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:var(--radius-xl);max-width:500px;width:90%;max-height:90vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.3s;scrollbar-width:none}
.modal-overlay.open .modal-sheet{transform:scale(1)}
.modal-sheet::-webkit-scrollbar{display:none}
.modal-body{padding:24px}
.close-btn{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:var(--surface-3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);z-index:10}
.close-btn svg{width:18px;height:18px}

/* ── PAGINATION ── */
.pagination{display:flex;gap:8px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.pagination button{padding:8px 12px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius-md);font-size:13px;cursor:pointer;transition:all 0.15s;font-weight:500}
.pagination button:hover{border-color:var(--indigo);color:var(--indigo)}
.pagination button.active{background:var(--indigo);color:white;border-color:var(--indigo)}

/* ── MOBILE ── */
@media(max-width:768px){
  .events-content{grid-template-columns:1fr;padding:16px}
  .events-sidebar{display:none;position:fixed;left:0;top:56px;width:100%;max-width:280px;height:auto;max-height:calc(100vh - 56px);overflow-y:auto;background:var(--surface);border-right:none;border-bottom:1px solid var(--border);padding:16px;z-index:90;transform:translateX(-100%);transition:transform 0.3s}
  .events-sidebar.open{transform:translateX(0)}
  .events-main{padding:0 16px}
  .nav-desktop{display:none}
  .filter-btn-mobile{display:flex}
  .hamburger{display:flex}
  .events-topbar{flex-direction:column;align-items:stretch}
  .events-grid{grid-template-columns:1fr}
  .events-result-count{margin-left:0}
}
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <a href="/" style="text-decoration:none">
      <div class="logo">
        <div class="logo-dot"></div>
        FestNest
      </div>
    </a>
    <div class="nav-desktop">
      <a href="/">Home</a>
      <a href="/events" class="active">Events</a>
      <a href="/post">Post Event</a>
      <a href="/saved">Saved</a>
      <a href="/blog">Blog</a>
    </div>
    <div class="nav-actions">
      <button class="btn btn-outline" id="navLoginBtn">Log In</button>
      <button class="btn btn-primary" id="navSignupBtn">Sign Up Free</button>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="events-container">
    <!-- Auth Lock Screen for non-logged-in users -->
    <div id="authLockContainer"></div>

    <div class="events-content" id="eventsLayoutContent" style="display:none;">
      <!-- Sidebar Filters -->
      <aside class="events-sidebar">
        <div class="sidebar-card">
          <div class="sidebar-heading">Filters</div>
          <div class="filter-group">
            <span class="filter-group-label">Category</span>
            <div class="filter-options" id="cat-filter-group">
              <button class="filter-chip filter-chip--active" data-filter="cat" data-value="All">All</button>
              <button class="filter-chip" data-filter="cat" data-value="Technical">Technical</button>
              <button class="filter-chip" data-filter="cat" data-value="Cultural">Cultural</button>
              <button class="filter-chip" data-filter="cat" data-value="Hackathon">Hackathon</button>
              <button class="filter-chip" data-filter="cat" data-value="Sports">Sports</button>
              <button class="filter-chip" data-filter="cat" data-value="Workshop">Workshop</button>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-group-label">Mode</span>
            <div class="filter-options" id="mode-filter-group">
              <button class="filter-chip filter-chip--active" data-filter="mode" data-value="All">All</button>
              <button class="filter-chip" data-filter="mode" data-value="Online">Online</button>
              <button class="filter-chip" data-filter="mode" data-value="Offline">Offline</button>
              <button class="filter-chip" data-filter="mode" data-value="Hybrid">Hybrid</button>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-group-label">Fee</span>
            <div class="filter-options" id="fee-filter-group">
              <button class="filter-chip filter-chip--active" data-filter="fee" data-value="All">All</button>
              <button class="filter-chip" data-filter="fee" data-value="Free">Free</button>
              <button class="filter-chip" data-filter="fee" data-value="Paid">Paid</button>
            </div>
          </div>
          <button class="btn-clear-filters" id="clearFiltersBtn">Clear All Filters</button>
        </div>
        <div class="sidebar-card">
          <div class="sidebar-heading">Trending Tags</div>
          <div class="trending-tags">
            <button class="trending-tag" data-tag="hackathon">#hackathon</button>
            <button class="trending-tag" data-tag="iit">#iit</button>
            <button class="trending-tag" data-tag="nit">#nit</button>
            <button class="trending-tag" data-tag="coding">#coding</button>
            <button class="trending-tag" data-tag="robotics">#robotics</button>
            <button class="trending-tag" data-tag="dance">#dance</button>
            <button class="trending-tag" data-tag="ai">#ai</button>
            <button class="trending-tag" data-tag="sports">#sports</button>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="events-main">
        <div class="events-header">
          <div class="events-topbar">
            <div class="search-bar-events">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input type="search" id="eventsSearchInput" placeholder="Search events, colleges, tags..." autocomplete="off" />
              <button class="filter-btn-mobile" id="openFiltersBtn" aria-label="Open filters">
                <i class="fas fa-sliders-h"></i>
              </button>
            </div>
            <select class="events-sort" id="eventsSortSelect">
              <option value="newest">Newest First</option>
              <option value="popular">Most Popular</option>
              <option value="deadline">By Start Date</option>
            </select>
            <div class="events-result-count" id="eventsResultCount">Loading...</div>
          </div>
        </div>

        <!-- Category Pills -->
        <div class="cat-pills">
          <button class="cat-pill cat-pill--active" data-cat="All">All Events</button>
          <button class="cat-pill" data-cat="Technical">Technical</button>
          <button class="cat-pill" data-cat="Cultural">Cultural</button>
          <button class="cat-pill" data-cat="Hackathon">Hackathons</button>
          <button class="cat-pill" data-cat="Sports">Sports</button>
          <button class="cat-pill" data-cat="Workshop">Workshops</button>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="eventsGrid"></div>
        <nav class="pagination"></nav>
      </main>
    </div>
  </div>

<!-- Event Detail Modal -->
<div class="modal-overlay" id="eventModal" role="dialog" aria-modal="true" aria-label="Event details">
  <div class="modal-sheet" id="eventModalSheet">
    <button class="close-btn" onclick="closeEventModal()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="modal-body" id="eventModalContent">
      <!-- Event details will be populated here -->
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal" role="dialog" aria-modal="true" aria-label="Sign in or create account">
  <div class="modal-sheet" id="authModalBox" style="max-width:420px;">
    <button class="close-btn" id="authModalClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="modal-body">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--indigo);">FestNest</div>
      </div>
      
      <!-- Auth Tabs -->
      <div style="display:flex;gap:12px;margin-bottom:24px;border-bottom:1px solid var(--border);">
        <button id="tab-login" style="flex:1;padding:12px;border:none;background:none;font-family:var(--font-body);font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;" onclick="switchAuthTab('login')">Log In</button>
        <button id="tab-signup" style="flex:1;padding:12px;border:none;background:none;font-family:var(--font-body);font-weight:600;color:var(--indigo);cursor:pointer;border-bottom:2px solid var(--indigo);" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" style="display:none;gap:14px;display:flex;flex-direction:column;">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-1);">Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;color:var(--text-1);" />
          <span style="font-size:12px;color:var(--red);display:none;" id="loginEmailErr"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-1);">Password</label>
          <input type="password" id="loginPwd" placeholder="••••••••" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;color:var(--text-1);" />
          <span style="font-size:12px;color:var(--red);display:none;" id="loginPwdErr"></span>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:8px;">Log In</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" style="gap:14px;display:flex;flex-direction:column;">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-1);">Email</label>
          <input type="email" id="signupEmail" placeholder="you@college.edu" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;color:var(--text-1);" />
          <span style="font-size:12px;color:var(--red);display:none;" id="signupEmailErr"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-1);">Password (min. 8 characters)</label>
          <input type="password" id="signupPwd" placeholder="••••••••" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;color:var(--text-1);" />
          <span style="font-size:12px;color:var(--red);display:none;" id="signupPwdErr"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-1);">First Name</label>
          <input type="text" id="signupFirstName" placeholder="Your name" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;color:var(--text-1);" />
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-1);">College</label>

  <script>
    // Tab switching
    function switchAuthTab(tab) {
      if (tab === 'login') {
        document.getElementById('login-form').style.display = 'flex';
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('tab-login').style.borderBottomColor = 'var(--indigo)';
        document.getElementById('tab-login').style.color = 'var(--indigo)';
        document.getElementById('tab-signup').style.borderBottomColor = 'transparent';
        document.getElementById('tab-signup').style.color = 'var(--text-3)';
      } else {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'flex';
        document.getElementById('tab-login').style.borderBottomColor = 'transparent';
        document.getElementById('tab-login').style.color = 'var(--text-3)';
        document.getElementById('tab-signup').style.borderBottomColor = 'var(--indigo)';
        document.getElementById('tab-signup').style.color = 'var(--indigo)';
      }
    }

    // Close modals
    function closeEventModal() {
      document.getElementById('eventModal').classList.remove('open');
    }
    
    document.getElementById('authModal').onclick = function(e) {
      if (e.target === this) {
        this.classList.remove('open');
      }
    };

    document.getElementById('eventModal').onclick = function(e) {
      if (e.target === this) {
        this.classList.remove('open');
      }
    };

    // Mobile toggle
    let filterSidebarOpen = false;
    document.getElementById('openFiltersBtn')?.addEventListener('click', () => {
      document.querySelector('.events-sidebar').classList.toggle('open');
      filterSidebarOpen = !filterSidebarOpen;
    });

    document.getElementById('closeFiltersBtn')?.addEventListener('click', () => {
      document.querySelector('.events-sidebar').classList.remove('open');
      filterSidebarOpen = false;
    });
  </script>
