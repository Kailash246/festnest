<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Events - FestNest</title>
  <link rel="icon" type="image/png" href="/assets/images/fn_logo2.png?v=1">
  <link rel="shortcut icon" href="/assets/images/fn_logo2.png?v=1">
  <link rel="apple-touch-icon" href="/assets/images/fn_logo2.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/typography.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/navbar.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/pages/inner-pages.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <a class="nav-logo" href="/">
      <img src="/assets/images/fn_logo2.png" alt="FestNest Logo" class="logo-img" />
      <span class="logo-text">FestNest</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link active" href="/events">Events</a>
      <a class="nav-link" href="/post">Post Event</a>
      <a class="nav-link" href="/saved">Saved</a>
      <a class="nav-link" href="/search">Search</a>
      <a class="nav-link" href="/blog">Blog</a>
      <a class="nav-link" href="/why">Why FestNest</a>
    </div>
    <div class="nav-actions">
      <button class="btn btn-outline" id="navLoginBtn">Log In</button>
      <button class="btn btn-primary" id="navSignupBtn">Sign Up Free</button>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="mobile-drawer" id="mobileDrawer">
    <a class="drawer-link" href="/">Home</a>
    <a class="drawer-link active" href="/events">Events</a>
    <a class="drawer-link" href="/post">Post Event</a>
    <a class="drawer-link" href="/saved">Saved Events</a>
    <a class="drawer-link" href="/search">Search</a>
    <a class="drawer-link" href="/blog">Blog</a>
    <a class="drawer-link" href="/why">Why FestNest</a>
    <a class="drawer-link" href="/profile">Profile</a>
    <div class="drawer-auth">
      <button class="btn btn-outline w-full" id="drawerLoginBtn">Log In</button>
      <button class="btn btn-primary w-full" id="drawerSignupBtn">Sign Up Free</button>
    </div>
  </div>

  <div class="events-page">
    <!-- Auth Lock Screen for non-logged-in users -->
    <div id="authLockContainer"></div>

    <div class="events-layout" id="eventsLayoutContent" style="display:none;">
      <aside class="events-sidebar">
        <div class="sidebar-card">
          <div class="sidebar-heading">Filters</div>
          <div class="filter-group"><span class="filter-group-label">Category</span>
            <div class="filter-options" id="cat-filter-group">
              <button class="filter-chip filter-chip--active" data-filter="cat" data-value="All">All</button>
              <button class="filter-chip" data-filter="cat" data-value="Technical">Technical</button>
              <button class="filter-chip" data-filter="cat" data-value="Cultural">Cultural</button>
              <button class="filter-chip" data-filter="cat" data-value="Hackathon">Hackathon</button>
              <button class="filter-chip" data-filter="cat" data-value="Sports">Sports</button>
              <button class="filter-chip" data-filter="cat" data-value="Workshop">Workshop</button>
            </div>
          </div>
          <div class="filter-group"><span class="filter-group-label">Mode</span>
            <div class="filter-options" id="mode-filter-group">
              <button class="filter-chip filter-chip--active" data-filter="mode" data-value="All">All</button>
              <button class="filter-chip" data-filter="mode" data-value="Online">Online</button>
              <button class="filter-chip" data-filter="mode" data-value="Offline">Offline</button>
              <button class="filter-chip" data-filter="mode" data-value="Hybrid">Hybrid</button>
            </div>
          </div>
          <div class="filter-group"><span class="filter-group-label">Fee</span>
            <div class="filter-options" id="fee-filter-group">
              <button class="filter-chip filter-chip--active" data-filter="fee" data-value="All">All</button>
              <button class="filter-chip" data-filter="fee" data-value="Free">Free</button>
              <button class="filter-chip" data-filter="fee" data-value="Paid">Paid</button>
            </div>
          </div>
          <button class="btn-clear-filters" id="clearFiltersBtn">Clear All Filters</button>
        </div>
        <div class="sidebar-card">
          <div class="sidebar-heading">Trending Tags</div>
          <div class="trending-tags">
            <button class="trending-tag" data-tag="hackathon">#hackathon</button>
            <button class="trending-tag" data-tag="iit">#iit</button>
            <button class="trending-tag" data-tag="nit">#nit</button>
            <button class="trending-tag" data-tag="coding">#coding</button>
            <button class="trending-tag" data-tag="robotics">#robotics</button>
            <button class="trending-tag" data-tag="dance">#dance</button>
            <button class="trending-tag" data-tag="ai">#ai</button>
            <button class="trending-tag" data-tag="sports">#sports</button>
          </div>
        </div>
      </aside>
      <main class="events-main">
        <div class="events-topbar">
          <div class="search-bar-events">
            <span style="font-size:17px;color:var(--text-3);">Search</span>
            <input type="search" id="eventsSearchInput" placeholder="Search events, colleges, tags..." autocomplete="off" />
            <button class="filter-btn-mobile" id="openFiltersBtn" aria-label="Open filters">
              <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
                <!-- Top slider -->
                <path d="M 1 2 L 13 2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="16" cy="2" r="3" stroke="currentColor" stroke-width="2.5"/>
                <path d="M 19 2 L 19 2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                
                <!-- Middle slider -->
                <path d="M 7 8 L 19 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="4" cy="8" r="3" stroke="currentColor" stroke-width="2.5"/>
                <path d="M 1 8 L 1 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                
                <!-- Bottom slider -->
                <path d="M 1 14 L 13 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="16" cy="14" r="3" stroke="currentColor" stroke-width="2.5"/>
                <path d="M 19 14 L 19 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <select class="events-sort" id="eventsSortSelect">
            <option value="newest">Newest First</option>
            <option value="popular">Most Popular</option>
            <option value="deadline">By Start Date</option>
          </select>
          <div class="events-result-count" id="eventsResultCount">Loading...</div>
        </div>
        <div class="cat-pills">
          <button class="cat-pill cat-pill--active" data-cat="All">All Events</button>
          <button class="cat-pill" data-cat="Technical">Technical</button>
          <button class="cat-pill" data-cat="Cultural">Cultural</button>
          <button class="cat-pill" data-cat="Hackathon">Hackathons</button>
          <button class="cat-pill" data-cat="Sports">Sports</button>
          <button class="cat-pill" data-cat="Workshop">Workshops</button>
        </div>
        <div class="events-grid" id="eventsGrid"></div>
        <nav class="pagination"></nav>
      </main>
    </div>
  </div><!-- end events-layout -->

  <!-- Auth modal loaded globally - signup only on index.html -->
  
  <!-- FILTER MODAL (Mobile) -->
  <div class="filter-modal-overlay" id="filterModalOverlay"></div>
  <div class="filter-modal" id="filterModal">
    <div class="filter-modal-header">
      <h2>Filters</h2>
      <button class="filter-modal-close" id="closeFiltersBtn" aria-label="Close filters"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="filter-modal-content">
      <div class="filter-group">
        <span class="filter-group-label">Category</span>
        <div class="filter-options" id="modal-cat-filter-group">
          <button class="filter-chip filter-chip--active" data-filter="cat" data-value="All">All</button>
          <button class="filter-chip" data-filter="cat" data-value="Technical">Technical</button>
          <button class="filter-chip" data-filter="cat" data-value="Cultural">Cultural</button>
          <button class="filter-chip" data-filter="cat" data-value="Hackathon">Hackathon</button>
          <button class="filter-chip" data-filter="cat" data-value="Sports">Sports</button>
          <button class="filter-chip" data-filter="cat" data-value="Workshop">Workshop</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-group-label">Mode</span>
        <div class="filter-options" id="modal-mode-filter-group">
          <button class="filter-chip filter-chip--active" data-filter="mode" data-value="All">All</button>
          <button class="filter-chip" data-filter="mode" data-value="Online">Online</button>
          <button class="filter-chip" data-filter="mode" data-value="Offline">Offline</button>
          <button class="filter-chip" data-filter="mode" data-value="Hybrid">Hybrid</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-group-label">Fee</span>
        <div class="filter-options" id="modal-fee-filter-group">
          <button class="filter-chip filter-chip--active" data-filter="fee" data-value="All">All</button>
          <button class="filter-chip" data-filter="fee" data-value="Free">Free</button>
          <button class="filter-chip" data-filter="fee" data-value="Paid">Paid</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-group-label">Trending Tags</span>
        <div class="trending-tags-modal">
          <button class="trending-tag" data-tag="hackathon">#hackathon</button>
          <button class="trending-tag" data-tag="iit">#iit</button>
          <button class="trending-tag" data-tag="nit">#nit</button>
          <button class="trending-tag" data-tag="coding">#coding</button>
          <button class="trending-tag" data-tag="robotics">#robotics</button>
          <button class="trending-tag" data-tag="dance">#dance</button>
          <button class="trending-tag" data-tag="ai">#ai</button>
          <button class="trending-tag" data-tag="sports">#sports</button>
        </div>
      </div>
    </div>
    <div class="filter-modal-footer">
      <button class="btn btn-outline filter-modal-btn" id="clearFiltersModalBtn"><i class="fa-solid fa-refresh" style="margin-right:6px;"></i>Clear</button>
      <button class="btn btn-primary filter-modal-btn" id="applyFiltersBtn"><i class="fa-solid fa-check" style="margin-right:6px;"></i>Apply Filters</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <!-- Firebase (CDN v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <!-- Firebase config & initialization -->
  <script src="../assets/js/firebase-config.js"></script>
  <!-- Existing scripts -->
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/navbar.js"></script>
  <!-- Global auth modal - required for OTP functionality -->
  <script src="../assets/js/global-auth-modal-loader.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/auth-manager.js"></script>
  <script src="../assets/js/auth-lockscreen-loader.js"></script>
  <script src="../assets/js/pages/events.js"></script>
</body>
</html>
